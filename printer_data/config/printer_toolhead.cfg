# This file contains common pin mappings for the BIGTREETECH EBB36
# GEN2 board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB12/PB13)" .
# The "EBB36 GEN2" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBB]
canbus_uuid=401f603a912a

# [temperature_sensor EBB36]
# sensor_type: MAX31865
# sensor_pin: EBB:PA0
# pullup_resistor: 2200

[lis2dw]
cs_pin: EBB:PB1
spi_bus:spi2_PB2_PB11_PB10
axes_map: x,y,z

[extruder]
step_pin: EBB:PB14
dir_pin: EBB:PA8
enable_pin: !EBB:PB6
microsteps: 16
gear_ratio: 9:1                    # Gear ratio
rotation_distance: 48.088
full_steps_per_rotation: 200
filament_diameter: 1.750
nozzle_diameter: 0.400
heater_pin: EBB:PB4
sensor_type: PT1000
pullup_resistor: 2200
sensor_pin: EBB:PA3
control: pid
pid_Kp: 31.462
pid_Ki: 2.689
pid_Kd: 92.032
min_temp: 0
max_temp: 250

[tmc2209 extruder]
uart_pin: EBB:PB3
run_current: 0.650
stealthchop_threshold: 999999

[filament_switch_sensor fil_det]
pause_on_runout: False
runout_gcode: PAUSE
insert_gcode: RESUME
switch_pin: EBB:PD0

# [filament_switch_sensor HotendSensor]
# switch_pin: EBBCan:gpio6

[multi_pin part_cooling]
pins: EBB:PD3, EBB:PA5


[fan]
pin: multi_pin:part_cooling

# [heater_fan hotend_fan]
# pin: EBB:PA5
# heater: extruder
# heater_temp: 50.0

[heater_fan 3w_fan2]
pin: EBB:PD2
tachometer_pin: EBB:PA4

